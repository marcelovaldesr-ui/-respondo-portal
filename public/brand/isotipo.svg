<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Respondo">
  <defs>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#FF6B4A"/>
    </linearGradient>
    <!-- Nodos del sistema de marca (mismos trazos que el isotipo oficial) -->
    <symbol id="nodesWhite" viewBox="0 0 130 130">
      <line x1="65" y1="38" x2="35" y2="95" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
      <line x1="65" y1="38" x2="95" y2="95" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
      <line x1="35" y1="95" x2="95" y2="95" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
      <circle cx="65" cy="38" r="11" fill="#FFFFFF"/>
      <circle cx="35" cy="95" r="9" fill="#FFFFFF"/>
      <circle cx="95" cy="95" r="9" fill="#FFFFFF"/>
    </symbol>
  </defs>

  <!-- Marca circular: la versión que acompaña al logotipo horizontal -->
  <circle cx="64" cy="64" r="64" fill="url(#badgeGrad)"/>
  <use href="#nodesWhite" x="22" y="22" width="84" height="84"/>
</svg>
